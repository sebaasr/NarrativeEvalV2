function roleLabel(role) {
  return ({ faculty: 'Faculty', registrar: 'Registrar', admin: 'Admin', po_office: 'PO Office', student: 'Student' })[role] || role;
}

// Load HTML into a Quill editor so its internal model updates (clears the
// ql-blank placeholder). Empty content leaves the editor blank (placeholder shows).
function setEditorHtml(quill, html) {
  if (html && html.replace(/<(p|br)>|<\/p>|\s|&nbsp;/gi, '').length) {
    quill.setContents(quill.clipboard.convert(html), 'silent');
  } else {
    quill.setText('', 'silent');
  }
}

// Chronological sort key for a semester ("Spring 2026" → 20261). Higher = more recent.
function semesterKey(term, year) { return year * 10 + ({ Spring: 1, Summer: 2, Fall: 3 }[term] || 0); }
function semesterSortDesc(a, b) {
  const pa = a.split(' '), pb = b.split(' ');
  return semesterKey(pb[0], +pb[1]) - semesterKey(pa[0], +pa[1]);
}

// ── Evaluation highlights ────────────────────────────────────────────
// Heuristic extraction of "strengths" and "areas to improve" sentences from a
// narrative. No backend/API key needed (this app is static). For production,
// this could be replaced by a Claude-powered summary via a Supabase Edge
// Function — student360 already does an AI eval-summary server-side.
function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';
  return (d.textContent || '').replace(/\s+/g, ' ').trim();
}
const STRENGTH_CUES = /\b(exceptional|excellent|outstanding|impressive|insightful|thoughtful|sophisticated|standout|strongest|strong|mastery|generous|reliable|well[-\s](?:argued|organized|written|prepared|reasoned)|engaged|engagement|curious|rigorous|solid|clear(?:ly)?)\b/i;
const IMPROVE_CUES = /\b(should|could|needs?\sto|struggl\w*|develop|work on|improve|push (?:past|toward|beyond)|would benefit|lack\w*|more deeply|continue (?:developing|to)|to grow|not yet|encourage\w*|hedges?|sharper|stronger thesis)\b/i;

function extractHighlights(html) {
  const sentences = stripHtml(html)
    .split(/(?<=[.!?])\s+(?=[A-Z“"])/)
    .map(s => s.trim())
    .filter(s => s.length > 20);
  const strengths = [], improvements = [];
  for (const s of sentences) {
    if (IMPROVE_CUES.test(s)) improvements.push(s);
    else if (STRENGTH_CUES.test(s)) strengths.push(s);
  }
  return { strengths, improvements };
}

// Build the aggregated highlights tile from a student's submitted evaluations.
// rows: array of { course, ev }. Each highlight links to #evalcard-<courseId>.
function buildHighlightsTile(rows) {
  const strengths = [], improvements = [];
  for (const { course, ev } of rows) {
    if (!ev || ev.status !== 'submitted' || !course) continue;
    const h = extractHighlights(ev.public_narrative);
    const ref = `${course.code} · ${course.semester} ${course.year}`;
    h.strengths.slice(0, 2).forEach(t => strengths.push({ t, cid: course.id, ref }));
    h.improvements.slice(0, 2).forEach(t => improvements.push({ t, cid: course.id, ref }));
  }
  if (!strengths.length && !improvements.length) return '';
  const item = (x, color) => `
    <div class="hl-item" onclick="scrollToEval('${x.cid}')" title="Open the source evaluation">
      <span class="hl-dot" style="background:${color}"></span>
      <span class="hl-text">${x.t} <span class="hl-ref">— ${x.ref}</span></span>
    </div>`;
  return `
    <div class="card" style="margin-bottom:16px;">
      <div class="card-header">
        Evaluation Highlights
        <span style="font-size:12px;font-weight:400;color:#888;">Auto-extracted · click a highlight to open its evaluation</span>
      </div>
      <div class="card-body hl-grid">
        <div>
          <div class="hl-col-title" style="color:#1e7e34;">✦ Strengths</div>
          ${strengths.length ? strengths.map(x => item(x, '#28a745')).join('') : '<div class="hl-empty">—</div>'}
        </div>
        <div>
          <div class="hl-col-title" style="color:#b8860b;">➜ Areas to improve</div>
          ${improvements.length ? improvements.map(x => item(x, '#e0a800')).join('') : '<div class="hl-empty">—</div>'}
        </div>
      </div>
    </div>`;
}

function scrollToEval(courseId) {
  const el = document.getElementById('evalcard-' + courseId);
  if (!el) return;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.remove('flash');
  void el.offsetWidth;           // restart the animation if clicked again
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 1600);
}

function getDesignationBadge(d) {
  const map = {
    strong_sat:   ['SS',   'desig-satplus'],
    sat:          ['S',    'desig-sat'],
    marginal_sat: ['MS',   'desig-satminus'],
    unsat:        ['U',    'desig-unsat'],
    pass:         ['Pass', 'desig-pass'],
    fail:         ['F',    'desig-fnc'],
    inc:          ['INC',  'desig-inc'],
  };
  const [label, cls] = map[d] || ['—', ''];
  return cls ? `<span class="desig-badge ${cls}">${label}</span>` : label;
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#28a745';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3500);
}

// Dev utility — resets demo data to initial state
function resetDemoData() {
  localStorage.removeItem('ncf_eval_v5');
  localStorage.removeItem('ncf_demo_user_v2');
  location.reload();
}
